# python — general data science + single-cell + cheminformatics (Python 3.11)
#
# This is the DEFAULT kernel env. Derived from all_env_packages.csv: lists the
# headline scientific packages only; conda resolves the full dependency tree.
# Versions match the CSV where they are meaningful top-level packages.
name: python
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  # single-cell stack
  - scanpy=1.11.5
  - anndata=0.12.19
  - leidenalg=0.12.0
  - python-igraph=1.0.0
  - umap-learn=0.5.12
  - numba=0.66.0
  # machine learning + numerics
  - scikit-learn=1.9.0
  - numpy
  - scipy
  - pandas=2.3.3
  # plotting
  - matplotlib
  - seaborn
  - plotly=6.8.0
  # bio + IO + web
  - biopython=1.87
  - h5py
  - zarr
  - pyarrow
  - openpyxl
  - pypdf
  - beautifulsoup4
  - httpx
  - tqdm
  - statsmodels
  - networkx
  # pip-only packages
  - pip
  - pip:
      - fair-esm==2.0.0
      - rdkit-pypi==2022.9.5

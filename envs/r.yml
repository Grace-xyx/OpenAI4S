# r — R data science (R 4.5.3)
#
# Derived from all_env_packages.csv. Lists the headline R packages only; conda
# resolves the full dependency tree. conda-forge only (no bioconda) for the R
# stack. Versions match the CSV where they are meaningful top-level packages.
name: r
channels:
  - conda-forge
dependencies:
  - r-base=4.5.3
  - r-tidyverse=2.0.0
  - r-data.table
  - r-ggplot2
  - r-rmarkdown
  - r-knitr
  - r-jsonlite
